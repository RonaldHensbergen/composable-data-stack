# modules/secrets/vault/module.yaml
# yaml-language-server: $schema=../../../schemas/module.schema.json
apiVersion: cds/v1alpha1
kind: Module

metadata:
  name: vault
  category: secrets
  version: "0.1.0"
  displayName: Vault secrets provider
  description: >
    Secret provider module that can retrieve secrets from HashiCorp Vault.

spec:
  runtime:
    type: container
    service:
      name: secrets-vault
      ports: []
      networks:
        - default

  configSchema:
    type: object
    additionalProperties: false
    required:
      - address
      - tokenFrom
      - mountPath
    properties:
      address:
        type: string
        minLength: 1
      tokenFrom:
        type: string
        pattern: "^secrets\\.[a-zA-Z0-9_-]+$"
      mountPath:
        type: string
        minLength: 1
        default: secret/data

  provides:
    - name: secrets-provider
      contract:
        kind: secrets-provider
        spec:
          provider: vault
          addressFrom: spec.config.address
          tokenFrom: spec.config.tokenFrom
          mountPathFrom: spec.config.mountPath

  implementation:
    kind: docker-compose
    compose:
      services:
        vault:
          image: hashicorp/vault:2.0@sha256:a296a888b118615dc01d5f1a6846e6d4a7277946caaed5b447008fff5fe06b54
          user: vault
          init: true
          read_only: true
          cap_drop:
            - ALL
          security_opt:
            - no-new-privileges:true
          pids_limit: 256
          tmpfs:
            - /tmp:rw,noexec,nosuid,nodev,uid=100,gid=1000,mode=0700
            - /vault/file:rw,noexec,nosuid,nodev,uid=100,gid=1000,mode=0700
            - /vault/logs:rw,noexec,nosuid,nodev,uid=100,gid=1000,mode=0700
          ports:
            - "127.0.0.1:8200:8200"
          command:
            - server
            - -dev
            - -dev-listen-address=0.0.0.0:8200
            - -dev-root-token-id=${config.tokenFrom}
          environment:
            HOME: /tmp
            VAULT_ADDR: "${config.address}"
            VAULT_DISABLE_MLOCK: "true"
